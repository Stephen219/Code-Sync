name: Architecture Review

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Collect codebase context
        run: |
          {
            echo "# CODE-SYNC / FILESYNC ARCHITECTURE REVIEW"
            echo "Generated: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo ""

            echo "## 1. PROJECT STRUCTURE"
           find . -type f \( -name "*.cs" -o -name "*.csproj" -o -name "*.json" -o -name "*.md" \) | \
              grep -v '/obj/' | grep -v '/bin/' | grep -v '/.vs/' | grep -v '/node_modules/' | sort
            echo ""

            echo "## 2. PROJECT REFERENCES (dependency direction)"
            for csproj in $(find . -name "*.csproj" | sort); do
              echo "### $csproj"
              grep -E 'ProjectReference|PackageReference' "$csproj" 2>/dev/null || echo "(none)"
              echo ""
            done

            echo "## 3. DEPENDENCY VIOLATION SCAN"
            echo "### Domain referencing outer layers (should be NONE):"
            grep -rn "using FileSync.Application\|using FileSync.Infrastructure\|using FileSync.Api\|using FileSync.Web" \
              FileSync.Domain/ 2>/dev/null || echo "CLEAN"
            echo ""
            echo "### Application referencing Infrastructure/Api/Web (should be NONE):"
            grep -rn "using FileSync.Infrastructure\|using FileSync.Api\|using FileSync.Web" \
              FileSync.Application/ 2>/dev/null || echo "CLEAN"
            echo ""

            echo "## 4. ALL SOURCE FILES"
            for f in $(find . -name "*.cs" -type f | grep -v '/obj/' | grep -v '/bin/' | grep -v '/.vs/' | sort); do
              LINES=$(wc -l < "$f")
              echo "### FILE: $f ($LINES lines)"
              if [ "$LINES" -le 300 ]; then
                cat "$f"
              else
                head -150 "$f"
                echo "... (truncated - $LINES total lines) ..."
                tail -100 "$f"
              fi
              echo ""
            done

            echo "## 5. DOCUMENTATION"
            for doc in $(find . -name "*.md" -type f | sort); do
              echo "### DOC: $doc"
              cat "$doc"
              echo ""
            done

            echo "## 6. CONFIGURATION FILES"
            for cfg in $(find . \( -name "appsettings*.json" -o -name "Program.cs" -o -name "Startup.cs" \) | \
              grep -v '/obj/' | grep -v '/bin/' | sort); do
              echo "### CONFIG: $cfg"
              cat "$cfg"
              echo ""
            done

            echo "## 7. QUICK METRICS"
            CS_COUNT=$(find . -name '*.cs' | grep -v obj | grep -v bin | wc -l)
            CS_LINES=$(find . -name '*.cs' | grep -v obj | grep -v bin | xargs wc -l 2>/dev/null | tail -1 | awk '{print $1}')
            PROJ_COUNT=$(find . -name '*.csproj' | wc -l)
            echo "Total .cs files: $CS_COUNT"
            echo "Total C# lines: $CS_LINES"
            echo "Projects: $PROJ_COUNT"

          } > /tmp/context.txt

          echo "Collected $(wc -l < /tmp/context.txt) lines, $(wc -c < /tmp/context.txt) bytes"

      - name: Run Claude review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python3 << 'PYEOF'
          import json, os, urllib.request, urllib.error, sys

          api_key = os.environ["ANTHROPIC_API_KEY"]

          with open(".github/prompts/review-prompt.md") as f:
              prompt = f.read()
          with open("/tmp/context.txt") as f:
              context = f.read()

          full_message = f"{prompt}\n\n{context}"

          payload = json.dumps({
              "model": "claude-sonnet-4-20250514",
              "max_tokens": 8096,
              "messages": [{"role": "user", "content": full_message}]
          }).encode("utf-8")

          req = urllib.request.Request(
              "https://api.anthropic.com/v1/messages",
              data=payload,
              headers={
                  "Content-Type": "application/json",
                  "x-api-key": api_key,
                  "anthropic-version": "2023-06-01",
              },
              method="POST",
          )

          print(f"Sending {len(full_message)} chars to Claude API...")
          sys.stdout.flush()

          try:
              with urllib.request.urlopen(req, timeout=120) as resp:
                  data = json.loads(resp.read().decode())
          except urllib.error.HTTPError as e:
              body = e.read().decode()
              print(f"ERROR: Claude API returned HTTP {e.code}")
              print(body)
              sys.exit(1)
          except Exception as e:
              print(f"ERROR: {e}")
              sys.exit(1)

          text_parts = [b["text"] for b in data.get("content", []) if b.get("type") == "text"]
          result = "\n".join(text_parts)

          with open("/tmp/review.json", "w") as f:
              f.write(result)

          print(f"Review complete: {len(result)} chars")
          print(f"Tokens: {data.get('usage', {})}")
          PYEOF

      - name: Create GitHub Issue
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date -u +%Y-%m-%d)

          python3 << 'PYEOF' > /tmp/issue-body.md
          import json, re

          with open("/tmp/review.json") as f:
              raw = f.read()

          data = None

          # Try: JSON in code fence
          m = re.search(r'```json\s*(.*?)\s*```', raw, re.DOTALL)
          if m:
              try: data = json.loads(m.group(1))
              except: pass

          # Try: raw JSON
          if not data:
              try: data = json.loads(raw)
              except: pass

          # Try: first { to last }
          if not data:
              s, e = raw.find('{'), raw.rfind('}')
              if s != -1 and e != -1:
                  try: data = json.loads(raw[s:e+1])
                  except: pass

          if data:
              health = data.get('overallHealth', 'unknown').upper()
              icon = {"GREEN": "🟢", "YELLOW": "🟡", "RED": "🔴"}.get(health, "⚪")
              body = f"## {icon} Architecture Review — Health: {health}\n\n"
              body += f"{data.get('summary', '')}\n\n"

              for p in data.get('positives', []):
                  body += f"- ✅ {p}\n"
              if data.get('positives'):
                  body += "\n"

              for f in data.get('findings', []):
                  si = {"critical":"🔴","warning":"🟡","info":"🔵"}.get(f.get("severity",""),"⚪")
                  body += f"### {si} {f.get('id','')} — {f.get('title','')}\n\n"
                  body += f"**Severity:** {f.get('severity','')} | **Effort:** {f.get('estimatedEffort','')}\n\n"
                  body += f"{f.get('description','')}\n\n"
                  for af in f.get('affectedFiles', []):
                      body += f"- `{af}`\n"
                  if f.get('affectedFiles'): body += "\n"
                  body += f"**Suggestion:** {f.get('suggestion','')}\n\n"
                  for c in f.get('acceptanceCriteria', []):
                      body += f"- [ ] {c}\n"
                  if f.get('acceptanceCriteria'): body += "\n"
                  for d in f.get('definitionOfDone', []):
                      body += f"- [ ] {d}\n"
                  if f.get('definitionOfDone'): body += "\n"
                  body += "---\n\n"

              if data.get('userStories'):
                  body += "## 📋 User Stories\n\n"
                  for s in data['userStories']:
                      body += f"### {s.get('title','')}\n\n"
                      body += f"{s.get('description','')}\n\n"
                      body += f"**Points:** {s.get('storyPoints','?')} | **Priority:** {s.get('priority','?')}\n\n"
                      for c in s.get('acceptanceCriteria', []):
                          body += f"- [ ] {c}\n"
                      if s.get('acceptanceCriteria'): body += "\n"
                      for d in s.get('definitionOfDone', []):
                          body += f"- [ ] {d}\n"
                      if s.get('definitionOfDone'): body += "\n"
                      body += "---\n\n"

              sprint = data.get('sprintPlan', {})
              if sprint:
                  body += "## 🏃 Sprint Plan\n\n"
                  for phase, items in sprint.items():
                      body += f"**{phase}:**\n"
                      for item in (items if isinstance(items, list) else [items]):
                          body += f"- {item}\n"
                      body += "\n"

              body += "\n---\n*Auto-generated by Claude architecture review*\n"
          else:
              body = f"## Architecture Review\n\n⚠️ *Raw output (JSON parse failed):*\n\n{raw}\n"

          print(body)
          PYEOF

          # Close previous review issues
          gh issue list --repo "$GITHUB_REPOSITORY" --label "auto-review" --state open \
            --json number -q '.[].number' 2>/dev/null | while read -r num; do
            gh issue close "$num" --repo "$GITHUB_REPOSITORY" \
              --comment "Superseded by new review." 2>/dev/null || true
          done

          # Create issue (with fallback for oversized bodies)
          gh issue create \
            --repo "$GITHUB_REPOSITORY" \
            --title "🏗️ Architecture Review — ${DATE}" \
            --body-file /tmp/issue-body.md \
            --label "auto-review" || {
              echo "Body too large, truncating..."
              head -c 60000 /tmp/issue-body.md > /tmp/issue-truncated.md
              gh issue create \
                --repo "$GITHUB_REPOSITORY" \
                --title "🏗️ Architecture Review — ${DATE}" \
                --body-file /tmp/issue-truncated.md \
                --label "auto-review"
            }

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: review-${{ github.run_number }}
          path: |
            /tmp/context.txt
            /tmp/review.json
            /tmp/issue-body.md
          retention-days: 30
